<!DOCTYPE html>
<html lang="th" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleepy ィ Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Fredoka:wght@400;500;600;700&family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        eng: ['Fredoka', 'sans-serif'],
                        thai: ['Mitr', 'sans-serif'],
                        logo: ['"Alfa Slab One"', 'serif'],
                    },
                    colors: {
                        pastel: {
                            purple: '#dcb5ff',
                            purpleLight: '#f5eeff',
                            purpleDark: '#9b72cf',
                            blue: '#b5e3ff',
                            blueLight: '#ebf7ff',
                            pink: '#ffb5d9',
                            pinkLight: '#ffebf4',
                            yellow: '#ffeeb5',
                            yellowLight: '#fffcf2',
                        },
                        kawaii: {
                            bg: '#f7f3ff',
                            card: '#ffffff',
                            text: '#825e9c',
                            border: '#dcb5ff',
                            highlight: '#b27ee6',
                            header: '#eaddff'
                        }
                    },
                    boxShadow: {
                        'kawaii': '0 8px 24px -6px rgba(220, 181, 255, 0.4)',
                        'kawaii-inner': 'inset 0 2px 4px 0 rgba(220, 181, 255, 0.2)',
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'float-delayed': 'float 6s ease-in-out 3s infinite',
                        'gradient-x': 'gradient-x 3s ease infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' }
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-20px)' }
                        },
                        'gradient-x': {
                            '0%, 100%': { 'background-size': '200% 200%', 'background-position': 'left center' },
                            '50%': { 'background-size': '200% 200%', 'background-position': 'right center' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f7f3ff;
            background-image: 
                radial-gradient(circle at top left, rgba(181, 227, 255, 0.5) 0%, transparent 40%),
                radial-gradient(circle at bottom right, rgba(255, 181, 217, 0.5) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 238, 181, 0.4) 0%, transparent 40%),
                radial-gradient(#dcb5ff 2px, transparent 2px);
            background-size: 100% 100%, 100% 100%, 100% 100%, 30px 30px;
            background-attachment: fixed;
        }
        .title-stroke { -webkit-text-stroke: 10px white; }
        .card-kawaii {
            background: rgba(255, 255, 255, 0.95);
            border: 3px solid #dcb5ff;
            border-radius: 28px;
            box-shadow: 0 10px 25px -5px rgba(220, 181, 255, 0.4);
            position: relative;
        }
        .btn-kawaii {
            background: linear-gradient(135deg, #dcb5ff 0%, #ffb5d9 100%);
            border: 2px solid #fff;
            box-shadow: 0 4px 12px rgba(220, 181, 255, 0.5);
            transition: all 0.3s ease;
        }
        .btn-kawaii:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 6px 16px rgba(220, 181, 255, 0.7); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f5eeff; }
        ::-webkit-scrollbar-thumb { background: #dcb5ff; border-radius: 10px; }
        .modal-overlay { backdrop-filter: blur(5px); opacity: 0; visibility: hidden; transition: all 0.3s ease; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { transform: scale(0.9); transition: all 0.3s ease; }
        .modal-overlay.active .modal-content { transform: scale(1); }
    </style>
</head>
<body class="font-thai text-kawaii-text antialiased">
    <header class="relative pt-12 pb-20 overflow-hidden">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full -z-10 bg-gradient-to-r from-kawaii-header via-white to-transparent opacity-60"></div>
        
        <div class="container mx-auto px-4 text-center">
            <div class="flex justify-center gap-3 mb-8">
                <span class="px-4 py-1.5 bg-white rounded-full text-sm font-medium shadow-sm border border-pastel-purple/30 animate-float">✿ Graphic Design</span>
                <span class="px-4 py-1.5 bg-white rounded-full text-sm font-medium shadow-sm border border-pastel-pink/30 animate-float-delayed">✿ Start 39.-</span>
            </div>

            <div class="relative inline-block mb-6">
                <h1 class="font-logo text-6xl md:text-8xl text-kawaii-highlight relative z-10 leading-tight">Sleepy ィ</h1>
                <span class="font-logo text-6xl md:text-8xl absolute top-0 left-0 title-stroke z-0 select-none leading-tight" aria-hidden="true">Sleepy ィ</span>
            </div>
            
            <p class="font-eng text-xl md:text-2xl text-kawaii-text/80 mb-8 tracking-wide">Welcome to Sleepy shop</p>

            <div class="max-w-md mx-auto mb-10">
                <div class="bg-white/80 backdrop-blur p-1.5 rounded-2xl border-2 border-dashed border-kawaii-border flex items-center shadow-kawaii-inner">
                    <div class="flex-1 px-4 text-sm font-medium text-left">สถานะคิวงานวันนี้</div>
                    <div class="flex gap-1.5 pr-2">
                        <div class="w-2.5 h-2.5 rounded-full bg-green-400 animate-pulse"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-green-200"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-green-100"></div>
                    </div>
                </div>
            </div>

            <a href="https://ksm-bb.github.io/sleepyroom/" target="_blank" class="inline-flex items-center gap-3 px-8 py-4 bg-white border-4 border-dashed border-kawaii-border rounded-full hover:bg-kawaii-bg transition-colors group">
                <span class="w-3 h-3 bg-kawaii-highlight rounded-full group-hover:scale-125 transition-transform"></span>
                <span class="font-bold text-lg">เช็คคิวงานของทางร้าน</span>
                <span class="w-3 h-3 bg-kawaii-highlight rounded-full group-hover:scale-125 transition-transform"></span>
            </a>
        </div>
    </header>
